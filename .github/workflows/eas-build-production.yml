name: EAS production build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        required: true
        default: ios
        type: choice
        options:
          - ios
          - android
          - all
      submit:
        description: Auto-submit to App Store / Play after build
        required: true
        default: true
        type: boolean
  push:
    tags:
      - 'v*'

concurrency:
  group: eas-build-production-${{ github.event.inputs.platform || 'ios' }}
  cancel-in-progress: false

jobs:
  build:
    name: Build production
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PLATFORM: ${{ github.event.inputs.platform || 'ios' }}
      SUBMIT: ${{ github.event.inputs.submit || 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build (and submit if requested)
        run: |
          if [ "$SUBMIT" = "true" ]; then
            eas build \
              --profile production \
              --platform "$PLATFORM" \
              --non-interactive \
              --auto-submit
          else
            eas build \
              --profile production \
              --platform "$PLATFORM" \
              --non-interactive
          fi
