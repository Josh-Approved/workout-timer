name: EAS Update (production channel)

# Manual trigger only. Pushing to production immediately updates every
# installed user on the same runtimeVersion — never wire this to a
# branch push. Run from Actions UI: select branch (main), enter message,
# Run workflow.
#
# Native changes (Swift / Kotlin / new dependencies / native config) cannot
# ship via OTA — those still need a fresh production build. Use this for
# pure JS/TS/asset changes only.

on:
  workflow_dispatch:
    inputs:
      message:
        description: Update message (shown in EAS dashboard)
        required: true
        type: string

jobs:
  update:
    name: Publish EAS Update to production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish update to production channel
        run: eas update --channel production --message "${{ inputs.message }}" --non-interactive
