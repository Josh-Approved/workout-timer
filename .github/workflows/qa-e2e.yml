name: QA e2e

# Three QA tiers (canon § QA & testing):
#   • Tier 1 — `unit` job: fast headless logic tests (jest-expo). Runs ONCE,
#     platform-agnostic, and GATES the sim jobs — a cheap unit failure must
#     never cost 15+ min of sim time (token/minute discipline).
#   • Tier 2 — the iOS/Android jobs assert OUTCOMES (assert/assertNot waypoints
#     in qa/journey.json), on BOTH platforms — so a feature that only works on
#     one platform fails the other's job (cross-platform parity, enforced).
#   • Tier 3 — the same runs capture + frame store screenshots.
#
# GATE POLICY (canon § QA & testing — enforcement lands in the shipgate phase):
#   • TestFlight / internal beta = FAST: Tier 1 always; Tier 2 sometimes / smoke.
#   • Production / public release  = ALWAYS full Tier 2, both platforms.
#   This workflow is the PR gate (full set on every PR). The build-time gate that
#   distinguishes TestFlight-fast from prod-full is wired at submit time, not here.
#
# DEVICE MATRIX (P10 — qa/devices.json, runbooks/device-quality-net.md): this PR
# job IS the `smoke` profile — one phone per platform (iPhone + Pixel), light
# appearance, default font, portrait. Cost is deliberately unchanged. The `full`
# profile (every device × appearance × font-scale, landscape on tablets) +
# visual-regression baselines + the one bounded reviewer pass run per-RELEASE via
# `scripts/qa/matrix.mjs --profile full` (and on the monthly fleet-health sweep,
# P8), NOT on every PR — that's where breadth belongs, off the per-PR critical path.
#
# Tier 2/3 drive the app through scripted flows on cloud sims/emulators, capture
# screenshots at named waypoints, frame them via the vendored
# render-screenshots.mjs, and upload framed store assets as workflow artifacts.
# Free for public repos (unlimited Linux + macOS minutes).
#
# Gated to pull_request + workflow_dispatch only. Do NOT add `push: main` here —
# every push would burn 15+ minutes per platform.
#
# Build is performed by `eas build --local`, NOT raw xcodebuild / gradlew. The
# Expo build pipeline runs prebuild + pod install + Metro bundling itself, with
# the asset registry in place — bypassing it (e.g. via manual `expo
# export:embed`) breaks `expo-font` at runtime so the app boots blank. See
# stack/eas-build.md for the canonical reasoning.
#
# Surface gating runs in the `detect` job (NOT job-level `if: hashFiles(...)`,
# which fails because the workspace isn't checked out at job-eligibility time
# and causes GitHub to reject the entire workflow at registration).
#
# Each platform job runs the framer at the end, so framed PNGs are produced
# inside the job and uploaded as a single per-surface artifact. No cross-job
# choreography, no cross-repo access required.
#
# Required repo secret: EXPO_TOKEN. Used by `expo/expo-github-action@v8` for
# `eas build --local` project-identity validation.

on:
  pull_request:
  workflow_dispatch:

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      is-rn: ${{ steps.check.outputs.is-rn }}
      is-extension: ${{ steps.check.outputs.is-extension }}
      has-flow: ${{ steps.check.outputs.has-flow }}
    steps:
      - uses: actions/checkout@v6
      - id: check
        run: |
          [ -f app.json ] && echo "is-rn=true" >> "$GITHUB_OUTPUT" || echo "is-rn=false" >> "$GITHUB_OUTPUT"
          [ -f manifest.json ] && echo "is-extension=true" >> "$GITHUB_OUTPUT" || echo "is-extension=false" >> "$GITHUB_OUTPUT"
          # has-flow gates the sim jobs: an RN app with no journey.json AND no
          # committed flow has nothing for Maestro to drive, so its sim jobs are
          # N-A (Tier 1 unit green is the documented gate for those apps). The
          # flow is GENERATED from journey.json at CI time, so journey.json
          # presence counts even though qa/flows/mobile.yaml isn't committed.
          if [ -f qa/journey.json ] || [ -f qa/flows/mobile.yaml ]; then echo "has-flow=true" >> "$GITHUB_OUTPUT"; else echo "has-flow=false" >> "$GITHUB_OUTPUT"; fi

  unit:
    # Tier 1 — fast, headless logic tests (jest-expo). Runs once (platform-
    # agnostic JS, ~30s) and GATES the expensive sim jobs below via `needs`.
    # `--if-present` keeps apps that haven't adopted Tier 1 green; trailing
    # `--passWithNoTests` keeps an app green in the window between "test script
    # wired by sync" and "tests written" — the qa-canonical linter is what
    # enforces that tests EXIST; this job enforces that the ones that exist PASS.
    needs: detect
    if: needs.detect.outputs.is-rn == 'true' || needs.detect.outputs.is-extension == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - name: npm ci
        run: npm ci
      - name: Tier 1 — unit tests (jest)
        run: npm test --if-present -- --passWithNoTests

  ios:
    needs: [detect, unit]
    if: needs.detect.outputs.is-rn == 'true' && needs.detect.outputs.has-flow == 'true'
    runs-on: macos-15
    timeout-minutes: 60
    env:
      # EXPO_PUBLIC_* env is inlined into the JS bundle by Metro at bundle
      # time. eas build --local invokes Metro through the standard Expo
      # pipeline, which honours runner-shell env. No eas.json change needed.
      EXPO_PUBLIC_QA_MODE: '1'
      # Maestro's XCTest driver occasionally takes >2 min to start on macos-15
      # (the runner's first XCTest launch warms multiple subsystems). The
      # default startup timeout fails the run on those cold starts; bump to
      # 5 min so the driver gets a fair shot before we declare the run dead.
      MAESTRO_DRIVER_STARTUP_TIMEOUT: '300000'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          # macos-15 runners are Apple Silicon (arm64). Xcode 26.2 ships SDK
          # iOS 26.2, matching the iOS 26.2 simulator runtime pre-installed on
          # the image. Pinning Xcode is on us — eas.json's `image` field is
          # IGNORED for --local builds. If macos-15's image changes:
          # - re-check via setup-xcode failure output (lists installed Xcodes)
          # - cross-check with `xcrun simctl list runtimes` (installed runtimes)
          # - update both pins together.
          xcode-version: '26.2.0'
      - name: npm ci
        run: npm ci
      - name: Setup Expo + EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: EAS local build (iOS simulator)
        # Profile: preview, with `ios.simulator: true` in eas.json so the
        # output is a simulator-installable .app archive. Output is a tarball
        # containing the .app bundle (per Expo docs + eas-cli #1959).
        # --output requires a FILE PATH (not directory) with extension.
        run: |
          set -o pipefail
          eas build \
            --platform ios \
            --profile preview \
            --local \
            --non-interactive \
            --output "$GITHUB_WORKSPACE/ios-build.tar.gz" 2>&1 | tee eas-build-ios.log
      - name: Upload eas build log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ios-eas-build-log
          path: eas-build-ios.log
      - name: Extract simulator .app
        id: extract
        run: |
          mkdir -p extracted-ios
          tar -xzf "$GITHUB_WORKSPACE/ios-build.tar.gz" -C extracted-ios
          APP_PATH=$(find extracted-ios -maxdepth 3 -name "*.app" -type d -print -quit)
          if [ -z "$APP_PATH" ]; then
            echo "::error::no .app bundle found in ios-build.tar.gz"
            ls -laR extracted-ios | head -80
            exit 1
          fi
          echo "App path: $APP_PATH"
          echo "app-path=$APP_PATH" >> "$GITHUB_OUTPUT"
      - name: Verify .app architecture (arm64 sim required)
        # eas-cli #3281: --local can produce an x86_64-only .app on Apple
        # Silicon, which fails to install on macos-15 sims. Fail fast with a
        # clear message instead of silently breaking the install step.
        run: |
          BIN_PATH="${{ steps.extract.outputs.app-path }}"
          BINARY=$(find "$BIN_PATH" -maxdepth 2 -type f -perm +111 ! -name "*.dylib" | head -1)
          echo "Binary: $BINARY"
          ARCHS=$(lipo -archs "$BINARY" 2>/dev/null || echo "unknown")
          echo "Architectures: $ARCHS"
          if ! echo "$ARCHS" | grep -q "arm64"; then
            echo "::error::Built .app missing arm64 slice; will not install on Apple Silicon sim. See eas-cli #3281."
            exit 1
          fi
      - name: Boot iPhone 16 Pro Max (iOS 26.2) + normalize status bar
        id: sim
        run: |
          # Multiple sims with the same name exist (one per installed
          # runtime), so we pin via UDID created against the iOS 26.2 runtime.
          UDID=$(xcrun simctl create "qa-iphone" "iPhone 16 Pro Max" "com.apple.CoreSimulator.SimRuntime.iOS-26-2")
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b
          xcrun simctl status_bar "$UDID" override \
            --time "9:41" \
            --batteryState charged --batteryLevel 100 \
            --cellularBars 4 --wifiBars 3
      - name: Install app on simulator
        run: xcrun simctl install ${{ steps.sim.outputs.udid }} "${{ steps.extract.outputs.app-path }}"
      - name: Compile + lint flow (fail fast on drift)
        # The flow is GENERATED from qa/journey.json + qa/selectors.json. Compile
        # it, then lint: if a selector no longer grounds against src/**, or the
        # committed yaml is stale, fail HERE (seconds) instead of 20+ minutes into
        # the run with a blank screenshot. Skips cleanly for apps not yet adopted.
        run: |
          if [ -f qa/journey.json ]; then
            node scripts/qa/compile-flow.mjs
            node scripts/qa/lint-flows.mjs
          else
            echo "no qa/journey.json — using committed qa/flows/mobile.yaml as-is"
          fi
      - name: Run Maestro flow
        run: |
          mkdir -p qa/captures/ios
          maestro test qa/flows/mobile.yaml --env=PLATFORM=ios --env=STORE=ios --debug-output maestro-debug-ios
      - name: Show Maestro debug + heal proposal on failure
        if: failure()
        run: |
          echo "=== maestro-debug-ios tree ==="
          find maestro-debug-ios -type f 2>/dev/null | head -40 || true
          echo ""
          echo "=== maestro.log (full) ==="
          for f in $(find maestro-debug-ios -name "maestro.log" 2>/dev/null | sort | tail -1); do
            cat "$f"
          done
          echo ""
          echo "=== commands json (head 200) ==="
          for f in $(find maestro-debug-ios -name "commands-*.json" 2>/dev/null | sort | tail -1); do
            head -200 "$f"
          done
          echo ""
          echo "=== app UI hierarchy now ==="
          maestro hierarchy 2>&1 | head -200 || true
          echo ""
          echo "=== self-heal proposal (advisory — read qa/heal-report.json artifact) ==="
          # The sim is still booted in this job, so heal can read the live screen
          # and suggest the repair. Propose only (no --apply) — CI never commits.
          if [ -f qa/journey.json ]; then node scripts/qa/heal.mjs --from-device || true; fi
      - name: Frame screenshots
        if: success()
        run: node scripts/render-screenshots.mjs --store ios
      - name: Upload iOS artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: store-assets-ios
          # Maestro writes debug to `maestro-debug-ios/.maestro/...`;
          # upload-artifact excludes hidden paths by default, so the debug
          # bundle silently disappears without this flag.
          include-hidden-files: true
          path: |
            store-assets/screenshots/ios/
            qa/captures/ios/
            qa/heal-report.json
            maestro-debug-ios/

  android:
    needs: [detect, unit]
    if: needs.detect.outputs.is-rn == 'true' && needs.detect.outputs.has-flow == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      EXPO_PUBLIC_QA_MODE: '1'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
      - name: Install Chrome (for framer)
        run: sudo apt-get update && sudo apt-get install -y google-chrome-stable
      - name: npm ci
        run: npm ci
      - name: Compile + lint flow (fail fast on drift)
        # Generated-flow freshness + selector grounding, on the host before the
        # emulator even boots. Catches drift in seconds. Skips if not adopted.
        run: |
          if [ -f qa/journey.json ]; then
            node scripts/qa/compile-flow.mjs
            node scripts/qa/lint-flows.mjs
          else
            echo "no qa/journey.json — using committed qa/flows/mobile.yaml as-is"
          fi
      - name: Setup Expo + EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: EAS local build (Android APK)
        # Profile: preview, with `android.buildType: "apk"` in eas.json so the
        # output is an emulator-installable APK directly (no .aab, no tarball).
        # The load-bearing override of org.gradle.jvmargs lives in the
        # `./plugins/withGradleJvmArgs` config plugin (wired in app.json): it
        # rewrites android/gradle.properties at prebuild, which the Gradle
        # daemon reads and which wins over GRADLE_OPTS for the daemon JVM that
        # does the heavy lifting (KSP / lint). GRADLE_OPTS below is just a
        # belt-and-suspenders for any non-daemon Gradle calls. Without the
        # plugin a local build OOMs on Metaspace (default 512m).
        env:
          GRADLE_OPTS: '-Xmx4g -XX:MaxMetaspaceSize=1g'
        run: |
          set -o pipefail
          eas build \
            --platform android \
            --profile preview \
            --local \
            --non-interactive \
            --output "$GITHUB_WORKSPACE/build.apk" 2>&1 | tee eas-build-android.log
      - name: Upload eas build log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: android-eas-build-log
          path: eas-build-android.log
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Write Android e2e script to file
        run: |
          # android-emulator-runner@v2 runs each line of `script:` in its own
          # `sh -c`, so cross-line variables don't propagate. Workaround: write
          # the whole script to a file here and have `script:` call it.
          cat > /tmp/run-android-e2e.sh <<'SCRIPT_EOF'
          #!/usr/bin/env bash
          set -e
          # Suppress the system ANR / "isn't responding" dialogs. On the 2-core,
          # software-GPU (swiftshader) CI emulator the Pixel Launcher itself
          # intermittently ANRs during a run; its system dialog renders OVER the
          # app under test, so Maestro's hierarchy query returns aerr_wait /
          # aerr_close and every assertion fails against a screen that is, in
          # fact, fine (the app rendered correctly behind the dialog). This was
          # a flaky red — workout-timer passed, packing-list/grocery-list failed
          # the same week on identical app health. hide_error_dialogs=1 makes the
          # emulator deterministic by never popping the dialog. (Diagnosed P0,
          # 2026-06-10, from the failure screenshot: "Pixel Launcher isn't
          # responding" over a fully-rendered app.)
          adb shell settings put global hide_error_dialogs 1
          adb install -r "$GITHUB_WORKSPACE/build.apk"
          adb shell pm list packages | head -5
          mkdir -p qa/captures/android maestro-debug-android
          adb logcat -c
          adb logcat > maestro-debug-android/logcat.txt &
          LOGCAT_PID=$!
          set +e
          maestro test qa/flows/mobile.yaml --env=PLATFORM=android --env=STORE=android --debug-output maestro-debug-android
          MAESTRO_RC=$?
          kill $LOGCAT_PID || true
          if [ $MAESTRO_RC -ne 0 ]; then
            echo "=== maestro-debug-android tree ==="
            find maestro-debug-android -type f 2>/dev/null | head -40 || true
            echo ""
            echo "=== maestro.log (full) ==="
            for f in $(find maestro-debug-android -name "maestro.log" 2>/dev/null | sort | tail -1); do
              cat "$f"
            done
            echo ""
            echo "=== app UI hierarchy now ==="
            maestro hierarchy 2>&1 | head -200 || true
            echo ""
            echo "=== self-heal proposal (advisory — read qa/heal-report.json artifact) ==="
            if [ -f qa/journey.json ]; then node scripts/qa/heal.mjs --from-device || true; fi
            echo ""
            echo "=== logcat (tail 150) ==="
            tail -150 maestro-debug-android/logcat.txt 2>/dev/null || true
          fi
          exit $MAESTRO_RC
          SCRIPT_EOF
          chmod +x /tmp/run-android-e2e.sh
      - name: Run Maestro on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect -camera-back none
          disable-animations: true
          script: /tmp/run-android-e2e.sh
      - name: Frame screenshots
        if: success()
        env:
          CHROME_PATH: /usr/bin/google-chrome-stable
        run: node scripts/render-screenshots.mjs --store android
      - name: Upload Android artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: store-assets-android
          include-hidden-files: true
          path: |
            store-assets/screenshots/android/
            qa/captures/android/
            qa/heal-report.json
            maestro-debug-android/

  extension-chrome:
    needs: [detect, unit]
    if: needs.detect.outputs.is-extension == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: |
          if [ -f package.json ]; then npm ci; fi
          npm install --no-save playwright @playwright/test
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Install system Chrome (for framer)
        run: sudo apt-get update && sudo apt-get install -y google-chrome-stable
      - name: Run Playwright e2e
        run: |
          mkdir -p qa/captures/chrome
          npx playwright test qa/flows/extension.spec.ts --reporter=list
      - name: Frame screenshots
        env:
          CHROME_PATH: /usr/bin/google-chrome-stable
        run: node scripts/render-screenshots.mjs --store chrome
      - name: Upload Chrome framed store assets
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: store-assets-chrome
          path: |
            store-assets/screenshots/chrome/
            qa/captures/chrome/
