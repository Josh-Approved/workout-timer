name: EAS Update (dev channel)

on:
  push:
    branches:
      - dev

jobs:
  update:
    name: Publish EAS Update to dev
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish update to dev channel
        run: eas update --channel dev --message "${{ github.event.head_commit.message }}" --non-interactive
