######################################################################
# qa/flows/mobile.yaml — FWT Maestro flow for iOS + Android.
#
# Run by .github/workflows/qa-e2e.yml on PR + workflow_dispatch.
# Maestro's `text:` selector matches both visible text AND each platform's
# accessibility label (RN `accessibilityLabel` → iOS accessibilityLabel /
# Android contentDescription). For waits with timeouts use `extendedWaitUntil`,
# not `assertVisible.timeout`.
######################################################################

appId: com.joshapproved.freeworkouttimer
env:
  STORE: ios

---
- launchApp:
    clearState: true

# Diagnostic: capture whatever's on screen 8s after launch, before asserting.
# If the assertion below fails, this PNG (uploaded as artifact) shows what
# the app actually rendered — splash, error screen, blank, etc.
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: qa/captures/${STORE}/00-launch

# Waypoint 1 — timer list with the three QA fixture timers.
# NOTE: Maestro's `text:` selector matches accessibilityLabel (iOS) /
# contentDescription (Android), NOT bare visible text inside an accessible
# Pressable. Each timer card is a Pressable with label "Edit <name>" — that
# label swallows the inner title Text from the accessibility tree, so we
# assert against the label, not the title string.
- extendedWaitUntil:
    visible: "Free workout timer"
    timeout: 30000
- assertVisible: "Edit Standard Tabata"
- takeScreenshot: qa/captures/${STORE}/list

# Waypoint 2 — editor for Standard Tabata.
- tapOn: "Edit Standard Tabata"
- extendedWaitUntil:
    visible: "Save timer"
    timeout: 5000
- takeScreenshot: qa/captures/${STORE}/editor
- tapOn: "Back"

# Waypoint 3 — active workout, mid-exercise after the 10s countdown.
- tapOn: "Start Standard Tabata"
- extendedWaitUntil:
    visible: "Exercise"
    timeout: 15000
- takeScreenshot: qa/captures/${STORE}/active

# Waypoint 4 — settings (after stopping the workout via the system alert).
- tapOn: "Stop workout"
- tapOn: "Stop"
- extendedWaitUntil:
    visible: "Free workout timer"
    timeout: 5000
- tapOn: "Settings"
- extendedWaitUntil:
    visible: "Back"
    timeout: 5000
- takeScreenshot: qa/captures/${STORE}/settings
